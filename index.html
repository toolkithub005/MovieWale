<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieWale — Discover Movies, Trailers, Reviews & Entertainment</title>
    <meta name="description" content="MovieWale — Discover movies, trailers, reviews & entertainment. Browse by genre, language, and year. Your ultimate movie discovery destination." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://moviewale.online" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MovieWale" />
    <meta property="og:title" content="MovieWale — Discover Movies, Trailers, Reviews & Entertainment" />
    <meta property="og:description" content="Discover movies, trailers, reviews & entertainment. Browse by genre, language, and year." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MovieWale — Discover Movies, Trailers, Reviews & Entertainment" />
    <meta name="twitter:description" content="Discover movies, trailers, reviews & entertainment. Browse by genre, language, and year." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MovieWale",
      "url": "https://moviewale.online",
      "description": "Discover Movies, Trailers, Reviews & Entertainment",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://moviewale.online/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MovieWale",
      "url": "https://moviewale.online",
      "description": "Discover Movies, Trailers, Reviews & Entertainment"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" />
  </head>

  </body>
</html>
